<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>تسجيل الدخول — حاضر</title>
<meta name="theme-color" content="#0A4A45">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230F766E'/%3E%3Cpath d='M18 33l10 10 18-20' stroke='%23fff' stroke-width='7' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@700;800&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#20303C; --mut:#64727D; --line:#E2E8EA; --surface:#F3F6F5;
  --prim:#0F766E; --prim-deep:#0A4A45; --prim-soft:#E3F1EF;
  --no-soft:#FBEAEA;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans Arabic',system-ui,sans-serif;color:var(--ink);font-size:15px;line-height:1.6}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
input{font:inherit;color:inherit}
:focus-visible{outline:2px solid var(--prim);outline-offset:2px;border-radius:6px}
@media (prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}

.gate{min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:22px;gap:18px;
  background:
    radial-gradient(circle at 85% 8%,rgba(15,118,110,.12),transparent 45%),
    radial-gradient(circle at 10% 95%,rgba(15,118,110,.1),transparent 40%),
    var(--surface);
}
.card{
  width:100%;max-width:410px;background:#fff;border:1px solid var(--line);border-radius:20px;
  box-shadow:0 1px 2px rgba(14,42,40,.06),0 10px 26px -14px rgba(14,42,40,.16);
  padding:26px 24px;display:none;
}
.card.show{display:block;animation:pop .22s ease-out}
@keyframes pop{from{transform:translateY(10px);opacity:0}to{transform:none;opacity:1}}
.logo{width:58px;height:58px;border-radius:16px;background:var(--prim-deep);display:grid;place-items:center;margin:0 auto 14px;box-shadow:0 10px 24px -10px rgba(10,74,69,.6)}
h1{font-family:'Alexandria',sans-serif;text-align:center;font-size:23px;font-weight:800;color:var(--prim-deep)}
.sub{text-align:center;font-size:13px;color:var(--mut);margin:4px 0 18px}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.lbl{font-size:12px;font-weight:600;color:var(--mut)}
.inp{
  width:100%;background:#fff;border:1.5px solid var(--line);border-radius:10px;
  padding:9px 12px;font-size:14.5px;min-height:42px;transition:border-color .15s,box-shadow .15s;
}
.inp:focus{border-color:var(--prim);box-shadow:0 0 0 3px var(--prim-soft);outline:none}
.btn{
  width:100%;display:inline-flex;align-items:center;justify-content:center;gap:8px;
  background:var(--prim);color:#fff;border-radius:10px;padding:10px 16px;min-height:44px;
  font-size:14.5px;font-weight:600;margin-top:8px;
  box-shadow:0 4px 14px -6px rgba(15,118,110,.55);transition:background .15s,transform .08s;
}
.btn:hover{background:#0C635C}
.btn:active{transform:scale(.98)}
.btn[disabled]{opacity:.55;pointer-events:none}
.err{display:none;background:var(--no-soft);color:#991B1B;border:1px solid #F3C6C6;border-radius:10px;padding:9px 12px;font-size:13px;font-weight:600;margin-bottom:12px}
.err.show{display:block}
.spin{width:16px;height:16px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:rot .7s linear infinite}
.bspin{width:44px;height:44px;border:4px solid var(--prim-soft);border-top-color:var(--prim);border-radius:50%;animation:rot .8s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
.foot{font-size:11.5px;color:var(--mut)}
</style>
</head>
<body>
<div class="gate">
  <div class="bspin" id="chk"></div>
  <div id="chkMsg" style="display:none;max-width:420px;text-align:center;font-size:13.5px;font-weight:600;color:var(--ink);line-height:1.9"></div>
  <script>
  (function () {
    var BTN = '<button onclick="location.reload()" style="margin-top:10px;background:#0F766E;color:#fff;border:none;border-radius:9px;padding:9px 22px;font:inherit;font-weight:600;cursor:pointer">إعادة التحميل</button>';
    function live() { var c = document.getElementById("chk"); return c && c.style.display !== "none"; }
    function show(msg) {
      if (!live()) return;
      var m = document.getElementById("chkMsg");
      m.style.display = "block";
      m.innerHTML = 'صار خطأ بالتحميل:<br><code style="direction:ltr;display:inline-block;max-width:86vw;overflow-wrap:anywhere;background:#fff;border:1px solid #E2E8EA;border-radius:8px;padding:6px 10px;font-size:11px;margin:8px 0">' + String(msg).slice(0, 300) + '</code>' + BTN;
    }
    var t = setTimeout(function () {
      if (!live()) return;
      var m = document.getElementById("chkMsg");
      m.style.display = "block";
      m.innerHTML = 'التحميل متأخر أكثر من المعتاد…<br>تأكد من الإنترنت أو حدّث تحديثاً قوياً (Ctrl+F5).' + BTN;
    }, 12000);
    window.__bootDone = function () { clearTimeout(t); };
    window.addEventListener("error", function (e) {
      show((e.message || "خطأ غير معروف") + (e.filename ? " — " + String(e.filename).split("/").pop() : ""));
    });
    window.addEventListener("unhandledrejection", function (e) {
      show((e.reason && (e.reason.message || e.reason)) || "رفض غير معالج");
    });
  })();
  </script>

  <div class="card" id="card">
    <div class="logo"><svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.5l4.5 4.5L19 7.5"/></svg></div>
    <h1>حاضر</h1>
    <p class="sub">نظام حضور الطلاب — سجّل دخولك للمتابعة</p>
    <div class="err" id="aErr"></div>
    <div class="field">
      <label class="lbl" for="aEmail">البريد الإلكتروني</label>
      <input class="inp" id="aEmail" type="email" dir="ltr" autocomplete="username" placeholder="you@example.com">
    </div>
    <div class="field" style="margin-bottom:6px">
      <label class="lbl" for="aPass">كلمة السر</label>
      <input class="inp" id="aPass" type="password" dir="ltr" autocomplete="current-password" placeholder="••••••••">
    </div>
    <button class="btn" id="btnLogin">تسجيل الدخول</button>
  </div>

  <p class="foot">بعد الدخول تنتقل تلقائياً إلى صفحة النظام</p>
</div>

<script type="module">
/* إعدادات Firebase — مشروع labs-a4765 */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyD_L1hhp3fgX3l3nMQ-9pGZlGbX6yea5_k",
  authDomain: "labs-a4765.firebaseapp.com",
  projectId: "labs-a4765",
  storageBucket: "labs-a4765.firebasestorage.app",
  messagingSenderId: "55733943432",
  appId: "1:55733943432:web:0b3bad3b90af19e1cd333d"
};

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const $ = s => document.querySelector(s);
const app = initializeApp(FIREBASE_CONFIG);
const auth = getAuth(app);

onAuthStateChanged(auth, u => {
  if (window.__bootDone) window.__bootDone();
  if (u) { location.replace("LABS.html"); return; }
  $("#chk").style.display = "none";
  $("#card").classList.add("show");
  setTimeout(() => $("#aEmail").focus(), 60);
});

const AUTH_ERR = {
  "auth/invalid-email": "صيغة البريد الإلكتروني غير صحيحة.",
  "auth/user-not-found": "لا يوجد حساب بهذا البريد — أضفه من Firebase Console ← Authentication ← Users.",
  "auth/wrong-password": "كلمة السر غير صحيحة.",
  "auth/invalid-credential": "البريد أو كلمة السر غير صحيحة.",
  "auth/too-many-requests": "محاولات كثيرة — انتظر قليلاً ثم حاول مجدداً.",
  "auth/network-request-failed": "لا يوجد اتصال بالإنترنت — تسجيل الدخول يحتاج اتصالاً."
};
async function doLogin() {
  const btn = $("#btnLogin"), errB = $("#aErr");
  errB.classList.remove("show");
  btn.disabled = true; btn.innerHTML = '<span class="spin"></span> جارٍ الدخول…';
  try {
    await signInWithEmailAndPassword(auth, $("#aEmail").value.trim(), $("#aPass").value);
    /* التحويل يصير تلقائياً من onAuthStateChanged */
  } catch (e) {
    errB.textContent = AUTH_ERR[e.code] || "تعذّر تسجيل الدخول (" + (e.code || e.message) + ")";
    errB.classList.add("show");
    btn.disabled = false; btn.textContent = "تسجيل الدخول";
  }
}
$("#btnLogin").onclick = doLogin;
$("#aPass").addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
$("#aEmail").addEventListener("keydown", e => { if (e.key === "Enter") $("#aPass").focus(); });
</script>
</body>
</html>
